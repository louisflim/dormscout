# Server Configuration
server.port=8080
server.servlet.context-path=/

# Database Configuration - Using H2 for development
spring.datasource.url=jdbc:h2:mem:dormscoutdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# MySQL Configuration (uncomment for production)
# spring.datasource.url=jdbc:mysql://localhost:3306/dormscout
# spring.datasource.username=root
# spring.datasource.password=your_password
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console Configuration
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Application Configuration
spring.application.name=dormscout-backend

# Logging
logging.level.root=INFO
logging.level.com.dormscout.backend=DEBUG

# Security
spring.security.user.name=admin
spring.security.user.password=admin
